<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, follow" />
  <title>Página não encontrada | Suíça Box</title>
  <meta name="theme-color" content="#B41326" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #B41326;
      --red-dark: #8C0F1E;
      --black: #1B1B1B;
      --ink: #2A2A2A;
      --paper: #FAF8F5;
      --whatsapp: #25D366;
      --whatsapp-dark: #1EAE54;
    }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'Inter', Helvetica, Arial, sans-serif;
      color: var(--ink);
      background: var(--paper);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 540px;
      width: 100%;
      text-align: center;
    }
    .logo { height: 56px; width: auto; margin: 0 auto 32px; display: block; }
    .code {
      font-family: 'Helvetica Neue', Inter, Arial, sans-serif;
      font-size: clamp(72px, 18vw, 132px);
      font-weight: 800;
      line-height: 1;
      color: var(--red);
      letter-spacing: -0.03em;
    }
    h1 {
      font-family: 'Helvetica Neue', Inter, Arial, sans-serif;
      font-size: clamp(1.4rem, 5vw, 2rem);
      color: var(--black);
      margin: 12px 0 14px;
    }
    p { font-size: 1.02rem; color: #555; margin-bottom: 32px; }
    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-block;
      padding: 14px 26px;
      border-radius: 4px;
      font-weight: 600;
      text-decoration: none;
      font-size: 0.98rem;
      transition: background .15s ease, transform .15s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary { background: var(--red); color: #fff; }
    .btn-primary:hover { background: var(--red-dark); }
    .btn-whatsapp { background: var(--whatsapp); color: #fff; }
    .btn-whatsapp:hover { background: var(--whatsapp-dark); }
  </style>
</head>
<body>
  <main class="card">
    <img src="/static/logo.png" alt="Suíça Box" class="logo" />
    <div class="code">404</div>
    <h1>Página não encontrada</h1>
    <p>O endereço que você acessou não existe ou foi movido. Mas a gente resolve embalagem rápido — é só voltar e seguir daqui.</p>
    <div class="actions">
      <a href="/" class="btn btn-primary">Voltar para a página inicial</a>
      <a href="https://wa.me/5519936195754?text=Ol%C3%A1%21%20Cheguei%20por%20uma%20p%C3%A1gina%20que%20n%C3%A3o%20abriu%20no%20site." class="btn btn-whatsapp" target="_blank" rel="noopener">Falar no WhatsApp</a>
    </div>
  </main>
</body>
</html>
